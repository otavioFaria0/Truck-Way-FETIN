<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Truckway: rotas seguras, pontos de apoio, balanças e avaliações para caminhoneiros."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/logo/favicon.ico" />
    <link rel="apple-touch-icon" href="assets/logo/icon-192.png" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/mapa.css" />
    <title>Truckway</title>
  </head>
  <body>
    <div class="app">
      <header class="cabecalho">
        <button
          class="botao-icone"
          type="button"
          id="abrirMenu"
          aria-label="Abrir menu lateral"
        >
          <img
            src="conteudos/icones/barra-lateral.png"
            alt=""
            aria-hidden="true"
          />
        </button>

  <link rel="stylesheet" href="css/global.css" />
        <a
          href="#inicio"
          class="marca"
          aria-label="Truckway - voltar para a página inicial"
        >
          <span class="marca__logo" aria-hidden="true">TW</span>
          <span class="marca__nome">Truckway</span>
        </a>

        <div class="acoes-cabecalho">
          <button class="botao-icone" type="button" aria-label="Notificações">
            <img src="conteudos/icones/sino.png" alt="" aria-hidden="true" />
          </button>

          <button
            class="botao-perfil"
            type="button"
            aria-label="Área do usuário"
          >
            <span class="botao-perfil__avatar" aria-hidden="true">MF</span>
            <span class="botao-perfil__texto">
              <strong>Motorista</strong>
              <small>Entrar</small>
            </span>
          </button>
        </div>
      </header>

      <!-- Menu lateral, para ativar basta adicionar a classe "menu-lateral ativo" e trocar o "aria-hidden" para "false" -->
      <aside
        class="menu-lateral"
        id="menuLateral"
        aria-label="Menu lateral"
        aria-hidden="true"
      >
        <div class="menu-lateral__topo">
          <div>
            <p class="menu-lateral__titulo">Menu</p>
            <p class="menu-lateral__subtitulo">Ferramentas do projeto</p>
          </div>

          <button
            class="botao-icone"
            type="button"
            id="fecharMenu"
            aria-label="Fechar menu lateral"
          >
            ✕
          </button>
        </div>

        <nav class="menu-lateral__nav" aria-label="Navegação secundária">
          <button class="menu-lateral__link" type="button" data-pagina="inicio">
            Início
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="rota">
            Planejar rota
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="mapa">
            Mapa
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="apoio">
            Pontos de apoio
          </button>
          <button
            class="menu-lateral__link"
            type="button"
            data-pagina="avaliacoes"
          >
            Avaliações
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="sobre">
            Sobre nós
          </button>
        </nav>
      </aside>

      <nav class="menu-lateral__nav" aria-label="Navegação secundária">
        <button class="menu-lateral__link item-barra--ativo" type="button" data-pagina="inicio">Início</button>
        <button class="menu-lateral__link" type="button" data-pagina="rota">Planejar rota</button>
        <button class="menu-lateral__link" type="button" data-pagina="mapa">Mapa</button>
        <button class="menu-lateral__link" type="button" data-pagina="apoio">Pontos de apoio</button>
        <button class="menu-lateral__link" type="button" data-pagina="avaliacoes">Avaliações</button>
        <button class="menu-lateral__link" type="button" data-pagina="sobre">Sobre nós</button>
      </nav>
    </aside>

    <div class="overlay" id="overlay" hidden></div>

    <main id="conteudo" class="conteudo" tabindex="-1" aria-live="polite">

        <!-- O conteúdo das páginas será carregado aqui dinamicamente -->
         
    </main>
      <div class="overlay" id="overlay" hidden></div>

      <main id="conteudo" class="conteudo" tabindex="-1" aria-live="polite">
        <!-- O conteúdo das páginas será carregado aqui dinamicamente -->
        <!-- Exemplo de conteúdo inicial -->
        <h1>Site aberto</h1>
      </main>

      <nav class="barra-inferior" aria-label="Navegação principal">
        <button
          class="item-barra item-barra--ativo"
          type="button"
          data-pagina="inicio"
          aria-current="page"
        >
          <span class="item-barra__icone home" aria-hidden="true">
            <img src="conteudos/icones/home.png" alt="icone de home" />
          </span>
          <span>Início</span>
        </button>

        <button class="item-barra" type="button" data-pagina="rota">
          <span class="item-barra__icone rota" aria-hidden="true">
            <img src="conteudos/icones/rota.png" alt="icone de rota" />
          </span>
          <span>Rota</span>
        </button>

        <button class="item-barra" type="button" data-pagina="mapa">
          <span class="item-barra__icone mapa" aria-hidden="true">
            <img src="conteudos/icones/brasil.png" alt="icone de mapa" />
          </span>
          <span>Mapa</span>
        </button>

        <button class="item-barra" type="button" data-pagina="apoio">
          <span class="item-barra__icone apoio" aria-hidden="true">
            <img src="conteudos/icones/apoio.png" alt="icone de apoio" />
          </span>
          <span>Apoio</span>
        </button>
      </nav>
    </div>

    <noscript>
      <div class="aviso-noscript">
        Para usar o Truckway corretamente, é necessário habilitar o JavaScript.
      </div>
    </noscript>

    <script src="js/principal.js" defer></script>
    <script src="js/roteador.js" defer></script>
    <script src="js/roteador.js"></script>
    <script src="js/mapas.js"></script> </body>
  </body>
</html>
