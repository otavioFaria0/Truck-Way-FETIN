<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Truckway: rotas seguras, pontos de apoio, balanças e avaliações para caminhoneiros."
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="conteudos/icones/brasil.png" />
    <link rel="apple-touch-icon" href="conteudos/icones/brasil.png" />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/inicio.css" />
    <link rel="stylesheet" href="css/mapa.css" />
    <link rel="stylesheet" href="css/rota.css" />
    <link rel="stylesheet" href="css/apoio.css" />
    <link rel="stylesheet" href="css/avaliacoes.css" />
    <link rel="stylesheet" href="css/sobre.css" />
    
    <title>Truckway</title>
  </head>
  <body>
    <div class="app">
      <header class="cabecalho">
        <button
          class="botao-icone"
          type="button"
          id="abrirMenu"
          aria-label="Abrir menu lateral"
        >
          <img
            src="conteudos/icones/barra-lateral.png"
            alt=""
            aria-hidden="true"
          />
        </button>

        <a
          href="#inicio"
          class="marca"
          aria-label="Truckway - voltar para a página inicial"
        >
          <img class="logo" src="conteudos/logo/logo.jpeg" alt="Ícone de caminhão" aria-hidden="true" />
          <span class="marca__nome">Truckway</span>
        </a>

        <div class="acoes-cabecalho">
          <button class="botao-icone" type="button" aria-label="Notificações">
            <img src="conteudos/icones/sino.png" alt="" aria-hidden="true" />
          </button>

          <button
            class="botao-perfil"
            type="button"
            aria-label="Área do usuário"
            id="botaoPerfil"
          >
            <span class="botao-perfil__avatar" aria-hidden="true">MF</span>

            <span class="botao-perfil__texto">
              <strong>Motorista</strong>
              <small>Entrar</small>
            </span>
          </button>

          <div class="menu-perfil" id="menuPerfil">
            <a id="linkPerfil" href="paginas/perfil.html">Meu Perfil</a>
            <a id="linkLogin" href="paginas/login.html">Entrar / Criar conta</a>
            <button id="logoutBtn" type="button">Sair</button>
          </div>
        </div>
      </header>

      <aside
        class="menu-lateral"
        id="menuLateral"
        aria-label="Menu lateral"
        aria-hidden="true"
      >
        <div class="menu-lateral__topo">
          <div>
            <p class="menu-lateral__titulo">Menu</p>
            <p class="menu-lateral__subtitulo">Ferramentas do projeto</p>
          </div>
          <button
            class="botao-icone"
            type="button"
            id="fecharMenu"
            aria-label="Fechar menu lateral"
          >
            ✕
          </button>
        </div>

        <nav class="menu-lateral__nav" aria-label="Navegação secundária">
          <button class="menu-lateral__link" type="button" data-pagina="inicio">
            Início
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="rota">
            Planejar Rota
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="mapa">
            Mapa
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="apoio">
            Pontos de Apoio
          </button>
          <button
            class="menu-lateral__link"
            type="button"
            data-pagina="avaliacoes"
          >
            Avaliações
          </button>
          <button class="menu-lateral__link" type="button" data-pagina="sobre">
            Sobre
          </button>
        </nav>
      </aside>

      <div id="overlay" class="overlay" hidden></div>

      <main id="conteudo" class="conteudo"></main>

      <noscript class="aviso-noscript"
        >Este site requer JavaScript para funcionar corretamente.</noscript
      >
    </div>

    <footer
      class="barra-inferior"
      role="navigation"
      aria-label="Barra inferior"
    >
      <button class="item-barra home" type="button" data-pagina="inicio">
        <span class="item-barra__icone"
          ><img src="conteudos/icones/home.png" alt="Início"
        /></span>
        <span>Início</span>
      </button>

      <button class="item-barra rota" type="button" data-pagina="rota">
        <span class="item-barra__icone"
          ><img src="conteudos/icones/rota.png" alt="Rota"
        /></span>
        <span>Rota</span>
      </button>

      <button class="item-barra mapa" type="button" data-pagina="mapa">
        <span class="item-barra__icone"
          ><img src="conteudos/icones/brasil.png" alt="Mapa"
        /></span>
        <span>Mapa</span>
      </button>

      <button class="item-barra" type="button" data-pagina="apoio">
        <span class="item-barra__icone apoio" aria-hidden="true">
          <img src="conteudos/icones/apoio.png" alt="icone de apoio" />
        </span>
        <span>Apoio</span>
      </button>
    </footer>

    <noscript>
      <div class="aviso-noscript">Para usar o Truckway corretamente, é necessário habilitar o JavaScript.</div>
    </noscript>

    <script src="js/auth.js" defer></script>
    <script src="js/dados.js" defer></script>
    <script src="js/principal.js" defer></script>
    <script src="js/roteador.js" defer></script>
    <script src="js/paginas/inicio.js" defer></script>
    <script src="js/mapas.js" defer></script>
    <script src="js/paginas/rota.js" defer></script>
    <script src="js/paginas/apoio.js" defer></script>
    <script src="js/paginas/avaliacoes.js" defer></script>
  </body>
</html>
