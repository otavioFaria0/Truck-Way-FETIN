    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Truckway: rotas seguras, pontos de apoio, balanças e avaliações para caminhoneiros."
    />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/logo/favicon.ico" />
    <link rel="apple-touch-icon" href="assets/logo/icon-192.png" />
    
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/mapa.css" />
    <link rel="stylesheet" href="css/inicio.css" />

  <body>
    <div class="app">
      <header class="cabecalho">
        <button class="botao-icone" type="button" id="abrirMenu" aria-label="Abrir menu lateral">
          <img src="conteudos/icones/barra-lateral.png" alt="" aria-hidden="true" />
        </button>

        <a href="#inicio" class="marca" aria-label="Truckway - voltar para a página inicial">
          <span class="marca__logo" aria-hidden="true">TW</span>
          <span class="marca__nome">Truckway</span>

        <div class="acoes-cabecalho">
          <button class="botao-icone" type="button" aria-label="Notificações">
            <img src="conteudos/icones/sino.png" alt="" aria-hidden="true" />
          </button>

          <button class="botao-perfil" type="button" aria-label="Área do usuário">
            <span class="botao-perfil__avatar" aria-hidden="true">MF</span>
            <span class="botao-perfil__texto">
              <strong>Motorista</strong>
              <small>Entrar</small>
            </span>
          </button>
        </div>
      </header>

      <aside class="menu-lateral" id="menuLateral" aria-label="Menu lateral" aria-hidden="true">
        <div class="menu-lateral__topo">
          <div>
            <p class="menu-lateral__titulo">Menu</p>
            <p class="menu-lateral__subtitulo">Ferramentas do projeto</p>
          </div>
          <button class="botao-icone" type="button" id="fecharMenu" aria-label="Fechar menu lateral">✕</button>
        </div>

        <nav class="menu-lateral__nav" aria-label="Navegação secundária">
          <button class="menu-lateral__link" type="button" data-pagina="inicio">Início</button>
          <button class="menu
