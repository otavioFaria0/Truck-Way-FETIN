<div class="mapa-wrapper">
  <!-- Barra de busca flutuante -->
  <div class="busca-mapa">
    <input
      id="busca-mapa-input"
      type="search"
      placeholder="Buscar postos, cidades..."
      autocomplete="off"
      aria-label="Buscar no mapa"
    />
    <button id="busca-mapa-botao" type="button" aria-label="Buscar">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
    </button>
  </div>

  <!-- Overlay de carregamento da geolocalização -->
  <div id="mapa-carregando" class="mapa-carregando" hidden>
    <div class="mapa-carregando__spinner"></div>
    <p>Obtendo sua localização…</p>
  </div>

  <!-- Container do Leaflet -->
  <div id="mapa-container"></div>
</div>
